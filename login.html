<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · 代码雨</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0d15;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            width: 100vw;
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
            background: #0b0d15;
        }

        .back-home {
            position: fixed;
            top: 24px;
            left: 32px;
            z-index: 20;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
        }

        .back-home:hover {
            color: rgba(255, 255, 255, 0.85);
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(-4px);
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            padding: 1.5rem;
        }

        .login-card {
            pointer-events: auto;
            width: 100%;
            max-width: 400px;
            padding: 2.8rem 2.5rem 2.5rem;
            border-radius: 3rem;
            background: rgba(10, 14, 23, 0.65);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(0, 255, 100, 0.06);
            border: 1px solid rgba(0, 255, 100, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(0, 255, 100, 0.12);
        }

        .login-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            margin-bottom: 0.4rem;
            background: linear-gradient(135deg, #6fc3df, #bb7bdb, #f9d976);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .login-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
            font-weight: 300;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 1.2rem;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px 18px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.85);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.15);
            font-weight: 300;
        }

        .form-group input:focus {
            border-color: rgba(0, 255, 120, 0.25);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 30px rgba(0, 255, 120, 0.03), inset 0 0 20px rgba(0, 255, 120, 0.02);
        }

        .btn-login-submit {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: none;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, rgba(100, 180, 255, 0.15), rgba(0, 255, 120, 0.12));
            color: rgba(100, 200, 255, 0.85);
            border: 1px solid rgba(100, 180, 255, 0.15);
            text-transform: uppercase;
        }

        .btn-login-submit:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, rgba(100, 180, 255, 0.25), rgba(0, 255, 120, 0.20));
            border-color: rgba(100, 180, 255, 0.30);
            color: #8ac8ff;
            box-shadow: 0 12px 40px -12px rgba(100, 180, 255, 0.15);
        }

        .btn-login-submit:active {
            transform: translateY(0px) scale(0.97);
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.85rem;
        }

        .register-link a {
            color: rgba(100, 200, 255, 0.5);
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 500;
        }

        .register-link a:hover {
            color: rgba(100, 200, 255, 0.85);
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            padding: 12px 30px;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 500;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: rgba(0, 255, 120, 0.15);
            border: 1px solid rgba(0, 255, 120, 0.25);
            color: #8affc0;
            box-shadow: 0 8px 30px rgba(0, 255, 120, 0.08);
        }

        .toast.error {
            background: rgba(255, 80, 80, 0.15);
            border: 1px solid rgba(255, 80, 80, 0.25);
            color: #ff8a8a;
            box-shadow: 0 8px 30px rgba(255, 80, 80, 0.08);
        }

        @media (max-width: 480px) {
            .back-home {
                top: 16px;
                left: 16px;
                font-size: 0.75rem;
                padding: 6px 14px;
            }
            .login-card {
                padding: 2rem 1.5rem 1.8rem;
                border-radius: 2rem;
            }
            .login-title {
                font-size: 1.6rem;
            }
            .form-group input {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
            .btn-login-submit {
                padding: 12px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

    <a href="/" class="back-home">← 返回首页</a>

    <canvas id="matrixCanvas"></canvas>

    <div id="toast" class="toast"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <h1 class="login-title">🔐 登录</h1>
            <p class="login-subtitle">欢迎回来</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">用户名</label>
                    <input type="text" id="loginUsername" placeholder="输入用户名" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" placeholder="输入密码" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-login-submit">登 录</button>
            </form>

            <div class="register-link">
                还没有账号？ <a href="/register.html">去注册</a>
            </div>
        </div>
    </div>

    <script>
        // ===== 代码雨背景（与主页一致） =====
        (function() {
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');

            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            const trailLength = 0.04;
            const columnWidth = 18;
            const fontSize = 20;
            const columns = Math.floor(width / columnWidth);
            const drops = [];

            for (let i = 0; i < columns; i++) {
                drops[i] = -Math.random() * height * 1.5 - 20;
            }

            const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzアァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズヅブプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン";
            const charArray = chars.split('');

            function getRandomChar() {
                return charArray[Math.floor(Math.random() * charArray.length)];
            }

            function draw() {
                ctx.fillStyle = `rgba(10, 13, 23, ${trailLength})`;
                ctx.fillRect(0, 0, width, height);

                ctx.font = fontSize + 'px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';

                for (let i = 0; i < drops.length; i++) {
                    const x = i * columnWidth + columnWidth / 2;
                    let y = drops[i];
                    const char = getRandomChar();

                    let brightness = 0;
                    if (y > 0) {
                        brightness = Math.min(1, y / (height * 0.9));
                    }
                    brightness = Math.max(0.3, brightness);

                    const green = Math.floor(80 + 175 * brightness);
                    const red = Math.floor(10 + 40 * brightness);
                    const blue = Math.floor(20 + 80 * brightness);
                    ctx.fillStyle = `rgb(${red}, ${green}, ${blue})`;

                    if (y > height * 0.6 && Math.random() < 0.08) {
                        ctx.fillStyle = `rgba(200, 255, 220, 0.9)`;
                    }

                    if (y > 0) {
                        ctx.fillText(char, x, y);
                    }

                    const speed = 0.8 + Math.random() * 0.7;
                    drops[i] = y + speed;

                    if (drops[i] > height) {
                        drops[i] = -Math.random() * height * 0.6 - 30;
                    }
                }
            }

            let animationId = null;

            function animate() {
                draw();
                animationId = requestAnimationFrame(animate);
            }
            animate();

            let resizeTimeout = null;

            function handleResize() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;

                    const newColumns = Math.floor(width / columnWidth);
                    if (newColumns > drops.length) {
                        for (let i = drops.length; i < newColumns; i++) {
                            drops[i] = -Math.random() * height * 1.5 - 20;
                        }
                    } else if (newColumns < drops.length) {
                        drops.length = newColumns;
                    }
                }, 120);
            }
            window.addEventListener('resize', handleResize);

            window.addEventListener('beforeunload', function() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
                window.removeEventListener('resize', handleResize);
            });
        })();

        // ===== 用户登录逻辑 =====
        const form = document.getElementById('loginForm');
        const toast = document.getElementById('toast');

        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `toast ${type}`;
            void toast.offsetWidth;
            toast.classList.add('show');
            clearTimeout(toast._hideTimer);
            toast._hideTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showToast('⚠️ 请填写完整信息', 'error');
                return;
            }

            // 从 localStorage 读取用户数据
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.username === username && u.password === password);

            if (!user) {
                showToast('❌ 用户名或密码错误', 'error');
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginPassword').focus();
