<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="这是我的个人没用网站，用来分享和展示我的项目，敬请期待更多内容。">
    <link rel="canonical" href="https://maize.j3.ink/">
    <title>404 Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0d15;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            width: 100vw;
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
            background: #0b0d15;
        }

        .hero-wrapper {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            padding: 1.5rem;
        }

        .hero-text {
            text-align: center;
            padding: 2rem 2.5rem;
            border-radius: 3.5rem;
            background: rgba(10, 14, 23, 0.6);
            backdrop-filter: blur(6px) saturate(180%);
            -webkit-backdrop-filter: blur(6px) saturate(180%);
            box-shadow: 0 30px 60px -16px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 100, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            pointer-events: auto;
            max-width: 90vw;
            border: 1px solid rgba(0, 255, 100, 0.08);
        }

        .hero-text:hover {
            transform: scale(1.02);
            box-shadow: 0 40px 80px -12px rgba(0, 255, 100, 0.15), 0 0 0 1px rgba(0, 255, 100, 0.15);
        }

        .colorful-title {
            font-size: clamp(2.8rem, 14vw, 6.2rem);
            font-weight: 800;
            letter-spacing: 0.04em;
            line-height: 1.2;
            background: linear-gradient(135deg,
                    #f9d976,
                    #f39b7b,
                    #bb7bdb,
                    #6fc3df,
                    #8ed6b0,
                    #f9d976);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow:
                0 0 18px rgba(255, 215, 100, 0.25),
                0 0 40px rgba(140, 80, 255, 0.15),
                0 8px 30px rgba(0, 0, 0, 0.5);
            animation: gradientShift 8s ease-in-out infinite alternate;
            word-break: break-word;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .sub-message {
            margin-top: 1.8rem;
            font-size: clamp(0.9rem, 2.2vw, 1.3rem);
            color: rgba(0, 255, 120, 0.4);
            letter-spacing: 0.25em;
            font-weight: 300;
            text-transform: uppercase;
            border-top: 1px solid rgba(0, 255, 100, 0.08);
            padding-top: 1.6rem;
            display: inline-block;
            backdrop-filter: blur(2px);
            text-shadow: 0 0 12px rgba(0, 255, 100, 0.2);
        }

        .sub-message span {
            display: inline-block;
            animation: fadePulse 4.5s ease-in-out infinite;
        }

        @keyframes fadePulse {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.9;
            }
        }

        @media (max-width: 480px) {
            .hero-text {
                padding: 1.5rem 1.2rem;
                border-radius: 2.2rem;
                background: rgba(10, 14, 23, 0.7);
            }
            .sub-message {
                letter-spacing: 0.1em;
            }
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="hero-wrapper">
        <div class="hero-text">
            <h1 class="colorful-title">这里暂时什么都没有</h1>
            <div class="sub-message">
                <span>✦ 404 Not Found ✦</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');

            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            // ===== 核心参数：尾烟长度 =====
            // 数值越小，拖尾越短（雨滴越干净利落）；数值越大，拖尾越长。
            // 推荐范围：0.01 ~ 0.20
            const trailLength = 0.04;

            // ----- 代码雨参数 -----
            const columnWidth = 18;
            const fontSize = 20;
            const columns = Math.floor(width / columnWidth);
            const drops = [];

            // 【关键修改】所有雨滴初始位置都从屏幕外顶部开始 (负值)
            // 这样它们进入视野时已经是“明亮”状态，不会产生暗色拖尾
            for (let i = 0; i < columns; i++) {
                // 随机分布在 -height 到 0 之间，让它们错落进入视野
                drops[i] = -Math.random() * height * 1.5 - 20;
            }

            const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzアァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズヅブプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン";
            const charArray = chars.split('');

            function getRandomChar() {
                return charArray[Math.floor(Math.random() * charArray.length)];
            }

            // ----- 绘图函数 -----
            function draw() {
                // 半透明黑色覆盖 —— 控制尾烟长度
                ctx.fillStyle = `rgba(10, 13, 23, ${trailLength})`;
                ctx.fillRect(0, 0, width, height);

                ctx.font = fontSize + 'px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';

                for (let i = 0; i < drops.length; i++) {
                    const x = i * columnWidth + columnWidth / 2;
                    let y = drops[i];
                    const char = getRandomChar();

                    // 【关键修改】亮度计算：基于 y 在屏幕内的位置
                    // 当 y < 0 (在屏幕外) 时，亮度为0，但因为我们用负值开始，进入屏幕后才绘制
                    // 为了更平滑，只对 y > 0 的部分进行亮度渐变
                    let brightness = 0;
                    if (y > 0) {
                        brightness = Math.min(1, y / (height * 0.9));
                    }
                    // 确保最低亮度也有一定可见度
                    brightness = Math.max(0.3, brightness);

                    const green = Math.floor(80 + 175 * brightness);
                    const red = Math.floor(10 + 40 * brightness);
                    const blue = Math.floor(20 + 80 * brightness);
                    ctx.fillStyle = `rgb(${red}, ${green}, ${blue})`;

                    // 高亮闪烁 (只在屏幕下半部分)
                    if (y > height * 0.6 && Math.random() < 0.08) {
                        ctx.fillStyle = `rgba(200, 255, 220, 0.9)`;
                    }

                    // 只有 y > 0 时才绘制，避免在屏幕外绘制浪费性能
                    if (y > 0) {
                        ctx.fillText(char, x, y);
                    }

                    // 下落速度
                    const speed = 0.8 + Math.random() * 0.7;
                    drops[i] = y + speed;

                    // 重置到顶部（从屏幕外开始）
                    if (drops[i] > height) {
                        // 【关键修改】重置到屏幕外顶部，而不是从0开始
                        // 这样雨滴是“新进入”视野的，亮度从低到高渐变
                        drops[i] = -Math.random() * height * 0.6 - 30;
                    }
                }
            }

            // ----- 动画循环 -----
            let animationId = null;

            function animate() {
                draw();
                animationId = requestAnimationFrame(animate);
            }
            animate();

            // ----- 窗口自适应 -----
            let resizeTimeout = null;

            function handleResize() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;

                    const newColumns = Math.floor(width / columnWidth);
                    if (newColumns > drops.length) {
                        for (let i = drops.length; i < newColumns; i++) {
                            drops[i] = -Math.random() * height * 1.5 - 20;
                        }
                    } else if (newColumns < drops.length) {
                        drops.length = newColumns;
                    }
                }, 120);
            }
            window.addEventListener('resize', handleResize);

            window.addEventListener('beforeunload', function() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
                window.removeEventListener('resize', handleResize);
            });

            console.log(`当前尾烟长度 (trailLength) = ${trailLength} (数值越小拖尾越短)`);
        })();
    </script>
</body>
</html>
