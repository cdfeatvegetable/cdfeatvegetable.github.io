<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <style>
        /* 全局重置 + 全屏 canvas */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0d15;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            width: 100vw;
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
            background: #0b0d15;
        }

        /* ===== 右上角登录/注册按钮 ===== */
        .auth-bar {
            position: fixed;
            top: 24px;
            right: 32px;
            z-index: 20;
            display: flex;
            gap: 14px;
            align-items: center;
            pointer-events: auto;
        }

        .auth-btn {
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            color: rgba(255, 255, 255, 0.80);
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.5);
        }

        .auth-btn:hover {
            transform: translateY(-2px) scale(1.02);
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.25);
            color: #ffffff;
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.7);
        }

        .auth-btn:active {
            transform: translateY(0px) scale(0.97);
        }

        /* 登录按钮 - 强调色 (绿色调，与代码雨呼应) */
        .btn-login {
            background: rgba(0, 255, 120, 0.10);
            border-color: rgba(0, 255, 120, 0.20);
            color: rgba(0, 255, 150, 0.90);
        }

        .btn-login:hover {
            background: rgba(0, 255, 120, 0.20);
            border-color: rgba(0, 255, 120, 0.40);
            color: #8affc0;
            box-shadow: 0 0 30px rgba(0, 255, 120, 0.10);
        }

        /* 注册按钮 - 强调色 (紫色调，与彩色文字呼应) */
        .btn-register {
            background: rgba(180, 120, 255, 0.10);
            border-color: rgba(180, 120, 255, 0.20);
            color: rgba(200, 170, 255, 0.90);
        }

        .btn-register:hover {
            background: rgba(180, 120, 255, 0.20);
            border-color: rgba(180, 120, 255, 0.40);
            color: #d4bfff;
            box-shadow: 0 0 30px rgba(180, 120, 255, 0.10);
        }

        /* ===== 内容层 ===== */
        .hero-wrapper {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            padding: 1.5rem;
        }

        .hero-text {
            text-align: center;
            padding: 2rem 2.5rem;
            border-radius: 3.5rem;
            background: rgba(10, 14, 23, 0.6);
            backdrop-filter: blur(6px) saturate(180%);
            -webkit-backdrop-filter: blur(6px) saturate(180%);
            box-shadow: 0 30px 60px -16px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 100, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            pointer-events: auto;
            max-width: 90vw;
            border: 1px solid rgba(0, 255, 100, 0.08);
        }

        .hero-text:hover {
            transform: scale(1.02);
            box-shadow: 0 40px 80px -12px rgba(0, 255, 100, 0.15), 0 0 0 1px rgba(0, 255, 100, 0.15);
        }

        .colorful-title {
            font-size: clamp(2.8rem, 14vw, 6.2rem);
            font-weight: 800;
            letter-spacing: 0.04em;
            line-height: 1.2;
            background: linear-gradient(135deg,
                    #f9d976,
                    #f39b7b,
                    #bb7bdb,
                    #6fc3df,
                    #8ed6b0,
                    #f9d976);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow:
                0 0 18px rgba(255, 215, 100, 0.25),
                0 0 40px rgba(140, 80, 255, 0.15),
                0 8px 30px rgba(0, 0, 0, 0.5);
            animation: gradientShift 8s ease-in-out infinite alternate;
            word-break: break-word;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .sub-message {
            margin-top: 1.8rem;
            font-size: clamp(0.9rem, 2.2vw, 1.3rem);
            color: rgba(0, 255, 120, 0.4);
            letter-spacing: 0.25em;
            font-weight: 300;
            text-transform: uppercase;
            border-top: 1px solid rgba(0, 255, 100, 0.08);
            padding-top: 1.6rem;
            display: inline-block;
            backdrop-filter: blur(2px);
            text-shadow: 0 0 12px rgba(0, 255, 100, 0.2);
        }

        .sub-message span {
            display: inline-block;
            animation: fadePulse 4.5s ease-in-out infinite;
        }

        @keyframes fadePulse {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.9;
            }
        }

        /* ===== 移动端适配 ===== */
        @media (max-width: 480px) {
            .auth-bar {
                top: 16px;
                right: 16px;
                gap: 10px;
            }

            .auth-btn {
                padding: 6px 16px;
                font-size: 0.8rem;
                border-radius: 30px;
            }

            .hero-text {
                padding: 1.5rem 1.2rem;
                border-radius: 2.2rem;
                background: rgba(10, 14, 23, 0.7);
            }
            .sub-message {
                letter-spacing: 0.1em;
            }
        }

        @media (max-width: 380px) {
            .auth-bar {
                top: 12px;
                right: 12px;
                gap: 8px;
                flex-wrap: wrap;
                justify-content: flex-end;
            }
            .auth-btn {
                padding: 5px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 右上角登录 / 注册 ===== -->
    <div class="auth-bar">
        <a href="/login.html" class="auth-btn btn-login">登录</a>
        <a href="/register.html" class="auth-btn btn-register">注册</a>
    </div>

    <!-- Canvas 代码雨背景 -->
    <canvas id="matrixCanvas"></canvas>

    <!-- 内容层 -->
    <div class="hero-wrapper">
        <div class="hero-text">
            <h1 class="colorful-title">这里暂时什么都没有</h1>
            <div class="sub-message">
                <span>✦ 404 Not Found ✦</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');

            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            // ===== 尾烟长度 =====
            const trailLength = 0.04;

            // ----- 代码雨参数 -----
            const columnWidth = 18;
            const fontSize = 20;
            const columns = Math.floor(width / columnWidth);
            const drops = [];

            // 所有雨滴从屏幕外顶部开始
            for (let i = 0; i < columns; i++) {
                drops[i] = -Math.random() * height * 1.5 - 20;
            }

            const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzアァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズヅブプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン";
            const charArray = chars.split('');

            function getRandomChar() {
                return charArray[Math.floor(Math.random() * charArray.length)];
            }

            // ----- 绘图 -----
            function draw() {
                ctx.fillStyle = `rgba(10, 13, 23, ${trailLength})`;
                ctx.fillRect(0, 0, width, height);

                ctx.font = fontSize + 'px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';

                for (let i = 0; i < drops.length; i++) {
                    const x = i * columnWidth + columnWidth / 2;
                    let y = drops[i];
                    const char = getRandomChar();

                    let brightness = 0;
                    if (y > 0) {
                        brightness = Math.min(1, y / (height * 0.9));
                    }
                    brightness = Math.max(0.3, brightness);

                    const green = Math.floor(80 + 175 * brightness);
                    const red = Math.floor(10 + 40 * brightness);
                    const blue = Math.floor(20 + 80 * brightness);
                    ctx.fillStyle = `rgb(${red}, ${green}, ${blue})`;

                    if (y > height * 0.6 && Math.random() < 0.08) {
                        ctx.fillStyle = `rgba(200, 255, 220, 0.9)`;
                    }

                    if (y > 0) {
                        ctx.fillText(char, x, y);
                    }

                    const speed = 0.8 + Math.random() * 0.7;
                    drops[i] = y + speed;

                    if (drops[i] > height) {
                        drops[i] = -Math.random() * height * 0.6 - 30;
                    }
                }
            }

            // ----- 动画 -----
            let animationId = null;

            function animate() {
                draw();
                animationId = requestAnimationFrame(animate);
            }
            animate();

            // ----- 自适应 -----
            let resizeTimeout = null;

            function handleResize() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;

                    const newColumns = Math.floor(width / columnWidth);
                    if (newColumns > drops.length) {
                        for (let i = drops.length; i < newColumns; i++) {
                            drops[i] = -Math.random() * height * 1.5 - 20;
                        }
                    } else if (newColumns < drops.length) {
                        drops.length = newColumns;
                    }
                }, 120);
            }
            window.addEventListener('resize', handleResize);

            window.addEventListener('beforeunload', function() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
                window.removeEventListener('resize', handleResize);
            });
        })();
    </script>
</body>
</html>
